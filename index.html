<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard Jerman Harian</title>
    <meta name="theme-color" content="#dd0000">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        :root { --bg-color: #f4f6f9; --text-color: #2c3e50; --card-front: linear-gradient(135deg, #2b2b2b 0%, #1a1a1a 100%); --card-back: linear-gradient(135deg, #dd0000 0%, #a60000 100%); --btn-bg: #e0e6ed; --shadow: rgba(0,0,0,0.15); }
        body.dark-mode { --bg-color: #121212; --text-color: #f0f0f0; --btn-bg: #2a2a2a; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .header-bar { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .icon-btn { background: var(--btn-bg); border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }
        .card-container { width: 100%; max-width: 400px; height: 260px; perspective: 1000px; margin-bottom: 25px; cursor: pointer; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.6s; transform-style: preserve-3d; border-radius: 18px; box-shadow: 0 12px 24px var(--shadow); }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 18px; padding: 20px; }
        .card-front { background: var(--card-front); color: #fff; }
        .card-back { background: var(--card-back); color: #ffcc00; transform: rotateY(180deg); }
        .speak-btn { background: rgba(255,204,0,0.2); border: 1px solid #ffcc00; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; color: #fff; }
        .controls { display: flex; gap: 10px; width: 100%; max-width: 400px; }
        .nav-btn { background-color: #1a1a1a; color: #fff; border: none; padding: 12px; border-radius: 10px; cursor: pointer; flex: 1; }
        .maintenance-note { margin-top: 30px; font-size: 12px; color: #7f8c8d; text-align: center; }
        .copyright { margin-top: 15px; font-size: 12px; color: #95a5a6; }
        .copyright a { color: #dd0000; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="header-bar">
        <button class="icon-btn" id="darkModeToggle">🌙</button>
        <div id="streakDisplay">🔥 0 Hari</div>
    </div>

    <h1>🇩🇪 Flashcard Jerman</h1>

    <div class="card-container" onclick="flipCard()">
        <div class="card" id="flashcard">
            <div class="card-face card-front">
                <div id="wordArticle">-</div>
                <h2 id="wordText">Memuat...</h2>
                <button class="speak-btn" onclick="speakWord(event)">🔊</button>
            </div>
            <div class="card-face card-back">
                <h2 id="wordMeaning">-</h2>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="nav-btn" onclick="prevWord()">Mundur</button>
        <button class="nav-btn" onclick="nextWord()">Lanjut</button>
    </div>

    <div class="maintenance-note">⚠️ <i>Catatan: Tombol audio sedang dalam perbaikan fungsi.</i></div>
    <div class="copyright">© 2026 <a href="https://www.instagram.com/nuari_chester/" target="_blank">Chester</a></div>

    <script>
        const database = [{ article: "der", word: "Vater", meaning: "Ayah" }, { article: "die", word: "Mutter", meaning: "Ibu" }]; // Contoh database singkat
        let currentIndex = 0;

        function updateCard() {
            const data = database[currentIndex];
            document.getElementById('wordArticle').textContent = data.article;
            document.getElementById('wordText').textContent = data.word;
            document.getElementById('wordMeaning').textContent = data.meaning;
        }

        function flipCard() { document.getElementById('flashcard').classList.toggle('is-flipped'); }
        function nextWord() { currentIndex = (currentIndex + 1) % database.length; updateCard(); }
        function prevWord() { currentIndex = (currentIndex - 1 + database.length) % database.length; updateCard(); }

        function speakWord(event) {
            event.stopPropagation();
            const word = document.getElementById('wordText').textContent.trim();
            const repoAudioUrl = `audio/${word}.mp3`;
            const audio = new Audio(repoAudioUrl);
            
            audio.onerror = () => {
                const msg = new SpeechSynthesisUtterance(word);
                msg.lang = 'de-DE';
                window.speechSynthesis.speak(msg);
            };
            audio.play();
        }

        document.getElementById('darkModeToggle').onclick = () => document.body.classList.toggle('dark-mode');
        updateCard();
    </script>
</body>
</html>
